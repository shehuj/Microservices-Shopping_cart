name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform-apply:
    name: Terraform Apply (infra)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_dockerhub_username: ${{ secrets.DOCKER_USERNAME }}
      TF_VAR_dockerhub_token: ${{ secrets.DOCKER_PASSWORD }}
      TF_VAR_kube_context: ${{ secrets.KUBE_CONTEXT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=shopping-cart/k8s/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -no-color

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  validate-infra:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert required infra files exist
        run: |
          missing=()
          [ -f Dockerfile ] || missing+=("Dockerfile")
          [ -f deploymentservice.yml ] || missing+=("deploymentservice.yml")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required infra files: ${missing[*]}"
            exit 1
          fi
          echo "All required infra files present."

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifest (dry-run)
        run: kubectl apply --dry-run=client -f deploymentservice.yml

  build-test-push:
    name: Build, Test & Push Image
    runs-on: ubuntu-latest
    needs: validate-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: mvn clean verify -Dmaven.test.failure.ignore=false

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/shopping-cart:pr-${{ github.event.number }} .

      - name: Smoke-test the image
        run: |
          docker run -d --name smoke-test -p 8070:8070 \
            ${{ secrets.DOCKER_USERNAME }}/shopping-cart:pr-${{ github.event.number }}
          echo "Waiting for app to start..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8070/; then
              echo "App is up."
              break
            fi
            [ "$i" -eq 12 ] && { docker logs smoke-test; echo "App failed to start"; exit 1; }
            sleep 5
          done
          docker stop smoke-test
          docker rm smoke-test

      - name: Push PR image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/shopping-cart:pr-${{ github.event.number }}
