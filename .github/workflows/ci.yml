name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-infra:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert required files exist
        run: |
          missing=()
          [ -f app/Dockerfile ] || missing+=("app/Dockerfile")
          [ -f infra/deploymentservice.yml ] || missing+=("infra/deploymentservice.yml")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required files: ${missing[*]}"
            exit 1
          fi
          echo "All required files present."

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Validate Kubernetes manifest
        run: kubeconform -strict -summary infra/deploymentservice.yml

  build-test-push:
    name: Build, Test & Push Image
    runs-on: ubuntu-latest
    needs: validate-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        working-directory: app
        run: mvn clean verify -Dmaven.test.failure.ignore=false

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mallam-shehu-suya:pr-${{ github.event.number }} app/

      - name: Smoke-test the image
        run: |
          docker run -d --name smoke-test -p 8070:8070 \
            ${{ secrets.DOCKER_USERNAME }}/mallam-shehu-suya:pr-${{ github.event.number }}
          echo "Waiting for app to start..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8070/; then
              echo "App is up."
              break
            fi
            [ "$i" -eq 12 ] && { docker logs smoke-test; echo "App failed to start"; exit 1; }
            sleep 5
          done
          docker stop smoke-test
          docker rm smoke-test

      - name: Push PR image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mallam-shehu-suya:pr-${{ github.event.number }}
