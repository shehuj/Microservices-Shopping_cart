name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  validate-infra:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert required infra files exist
        run: |
          missing=()
          [ -f Dockerfile ] || missing+=("Dockerfile")
          [ -f deploymentservice.yml ] || missing+=("deploymentservice.yml")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required infra files: ${missing[*]}"
            exit 1
          fi
          echo "All required infra files present."

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifest (dry-run)
        run: kubectl apply --dry-run=client -f deploymentservice.yml

  build-test-push:
    name: Build, Test & Push Image
    runs-on: ubuntu-latest
    needs: validate-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: mvn clean verify -Dmaven.test.failure.ignore=false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/shopping-cart:pr-${{ github.event.number }} .

      - name: Smoke-test the image
        run: |
          docker run -d --name smoke-test -p 8070:8070 \
            ghcr.io/${{ github.repository_owner }}/shopping-cart:pr-${{ github.event.number }}
          echo "Waiting for app to start..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8070/; then
              echo "App is up."
              break
            fi
            [ "$i" -eq 12 ] && { docker logs smoke-test; echo "App failed to start"; exit 1; }
            sleep 5
          done
          docker stop smoke-test
          docker rm smoke-test

      - name: Push PR image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/shopping-cart:pr-${{ github.event.number }}
