name: EKS Cluster Provision

on:
  push:
    branches: [dev]
    paths:
      - 'infra/eks/**'
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read

jobs:
  eks:
    name: EKS ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/eks
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=shopping-cart/eks/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -detailed-exitcode -no-color
        continue-on-error: true

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: No changes detected
        if: steps.plan.outputs.exitcode == '0'
        run: echo "EKS cluster is up to date. Nothing to apply."

      - name: Terraform Apply
        if: >
          steps.plan.outputs.exitcode == '2' &&
          (github.event_name == 'push' ||
           github.event.inputs.action == 'apply')
        run: |
          echo "Provisioning EKS cluster..."
          terraform apply -auto-approve tfplan

      - name: Update kubeconfig after provision
        if: >
          steps.plan.outputs.exitcode == '2' &&
          (github.event_name == 'push' ||
           github.event.inputs.action == 'apply')
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name shopping-cart-eks
          kubectl get nodes

      - name: Terraform Plan only
        if: github.event.inputs.action == 'plan'
        run: echo "Plan complete. No apply requested."

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
