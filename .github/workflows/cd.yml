name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve image tag
        id: image-tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shopping-cart:${{ steps.image-tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/shopping-cart:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image tag in manifest
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/shopping-cart:${{ needs.build-and-push.outputs.image-tag }}"
          sed -i "s|image: .*/shopping-cart:.*|image: ${IMAGE}|" deploymentservice.yml

      - name: Apply Kubernetes manifest
        run: kubectl apply -f deploymentservice.yml

      - name: Wait for rollout
        run: kubectl rollout status deployment/shopping-cart-deployment --timeout=120s
