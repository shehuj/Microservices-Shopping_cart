name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: app
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve image tag
        id: image-tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: app/
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shopping-cart:${{ steps.image-tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/shopping-cart:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name shopping-cart-eks

      - name: Update image tag in manifest
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/shopping-cart:${{ needs.build-and-push.outputs.image-tag }}"
          sed -i "s|image: .*/shopping-cart:__TAG__|image: ${IMAGE}|" infra/deploymentservice.yml

      - name: Apply Kubernetes manifest
        run: |
          kubectl delete deployment shopping-cart-deployment \
            -n shopping-cart --ignore-not-found=true
          kubectl apply -f infra/deploymentservice.yml -n shopping-cart

      - name: Wait for rollout
        run: kubectl rollout status deployment/shopping-cart-deployment -n shopping-cart --timeout=5m
