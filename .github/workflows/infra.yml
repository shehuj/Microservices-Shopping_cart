name: Infra Provision

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_dockerhub_username: ${{ secrets.DOCKER_USERNAME }}
      TF_VAR_dockerhub_token: ${{ secrets.DOCKER_PASSWORD }}
      TF_VAR_kube_context: ${{ secrets.KUBE_CONTEXT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          printf '%s' "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Verify cluster is reachable
        run: |
          if ! kubectl cluster-info --request-timeout=10s > /dev/null 2>&1; then
            echo "::error::Kubernetes cluster is not reachable. Provision the cluster first, then re-run this workflow."
            exit 1
          fi
          echo "Cluster is reachable."

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=shopping-cart/k8s/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -detailed-exitcode
        continue-on-error: true

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: >
          steps.plan.outputs.exitcode == '2' &&
          (github.event_name == 'push' ||
           github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
