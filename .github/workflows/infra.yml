name: Infra Provision

on:
  push:
    branches: [dev]
    paths:
      - 'infra/**'
      - '!infra/eks/**'
  workflow_run:
    workflows: ["EKS Cluster Provision"]
    types: [completed]
    branches: [dev]
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read

jobs:
  check-cluster:
    name: Check EKS Cluster Exists
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    outputs:
      exists: ${{ steps.eks-check.outputs.exists }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Check EKS cluster
        id: eks-check
        run: |
          if aws eks describe-cluster --name shopping-cart-eks --region $AWS_REGION > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "EKS cluster found. Proceeding with Kubernetes resource provisioning."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::EKS cluster does not exist yet. Run the EKS Cluster Provision workflow first."
          fi

  terraform:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    needs: check-cluster
    if: needs.check-cluster.outputs.exists == 'true'
    environment: production
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_dockerhub_username: ${{ secrets.DOCKER_USERNAME }}
      TF_VAR_dockerhub_token: ${{ secrets.DOCKER_PASSWORD }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_cluster_name: shopping-cart-eks
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=shopping-cart/k8s/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -detailed-exitcode -no-color
        continue-on-error: true

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: No changes detected
        if: steps.plan.outputs.exitcode == '0'
        run: echo "Infrastructure is up to date. Nothing to apply."

      - name: Terraform Apply
        if: >
          steps.plan.outputs.exitcode == '2' &&
          (github.event_name == 'push' ||
           github.event_name == 'workflow_run' ||
           github.event.inputs.action == 'apply')
        run: |
          echo "Deploying Kubernetes resources..."
          terraform apply -auto-approve tfplan

      - name: Terraform Plan only
        if: github.event.inputs.action == 'plan'
        run: echo "Plan complete. No apply requested."

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
