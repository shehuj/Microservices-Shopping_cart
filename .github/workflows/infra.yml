name: Infra Provision

on:
  push:
    branches: [dev]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read

jobs:
  provision-eks:
    name: "1 · EKS Cluster"
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/eks
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=shopping-cart/eks/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -detailed-exitcode -no-color
        continue-on-error: true

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: No changes detected
        if: steps.plan.outputs.exitcode == '0'
        run: echo "EKS cluster is up to date. Nothing to apply."

      - name: Terraform Apply
        if: >
          steps.plan.outputs.exitcode == '2' &&
          (github.event_name == 'push' ||
           github.event.inputs.action == 'apply')
        run: |
          echo "Provisioning EKS cluster..."
          terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve

  provision-k8s:
    name: "2 · Kubernetes Resources"
    runs-on: ubuntu-latest
    needs: provision-eks
    environment: production
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_dockerhub_username: ${{ secrets.DOCKER_USERNAME }}
      TF_VAR_dockerhub_token: ${{ secrets.DOCKER_PASSWORD }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_cluster_name: shopping-cart-eks
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=shopping-cart/k8s/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -detailed-exitcode -no-color
        continue-on-error: true

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: No changes detected
        if: steps.plan.outputs.exitcode == '0'
        run: echo "Kubernetes resources are up to date. Nothing to apply."

      - name: Terraform Apply
        if: >
          steps.plan.outputs.exitcode == '2' &&
          (github.event_name == 'push' ||
           github.event.inputs.action == 'apply')
        run: |
          echo "Deploying Kubernetes resources..."
          terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
