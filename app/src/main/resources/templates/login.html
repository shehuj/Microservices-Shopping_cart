<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
  <div th:replace="/fragments/header :: header"/>
</head>

<body>

<div th:replace="/fragments/header :: navbar"/>

<section class="auth-section">
  <div class="auth-card">

    <div class="auth-brand">🍕</div>
    <h2 style="text-align:center;font-size:1.4rem;font-weight:700;margin-bottom:0.25rem;">Welcome back</h2>
    <p class="auth-subtitle">Sign in to place your order</p>

    <div class="alert-error" th:if="${param.error}">
      Invalid username or password. Please try again.
    </div>
    <div class="alert-info" th:if="${param.logout}">
      You have been signed out successfully.
    </div>

    <form th:action="@{/login}" method="post">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-input" placeholder="Enter your username"
             required="true" autofocus="true"/>

      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-input" placeholder="Enter your password"
             required="true"/>

      <button type="submit" class="btn-primary-full">Sign In</button>
    </form>

    <div class="auth-switch">
      New here? <a th:href="@{/registration}">Create an account</a>
    </div>

  </div>
</section>

<div th:replace="/fragments/footer :: footer"/>

</body>
</html>
