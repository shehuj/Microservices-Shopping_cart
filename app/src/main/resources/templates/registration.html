<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <div th:replace="/fragments/header :: header"/>
</head>

<body>

<div th:replace="/fragments/header :: navbar"/>

<section class="auth-section">
  <div class="auth-card">

    <div class="auth-brand">🍕</div>
    <h2 style="text-align:center;font-size:1.4rem;font-weight:700;margin-bottom:0.25rem;">Create Account</h2>
    <p class="auth-subtitle">Join QuickBite and start ordering</p>

    <div class="alert-success" th:if="${successMessage}" th:utext="${successMessage}"></div>

    <form autocomplete="off" th:action="@{/registration}" th:object="${user}" method="post">

      <div th:if="${#fields.hasErrors('name')}" class="alert-error" th:errors="*{name}"></div>
      <label class="form-label">First Name</label>
      <input type="text" th:field="*{name}" class="form-input" placeholder="First name"/>

      <div th:if="${#fields.hasErrors('lastName')}" class="alert-error" th:errors="*{lastName}"></div>
      <label class="form-label">Last Name</label>
      <input type="text" th:field="*{lastName}" class="form-input" placeholder="Last name"/>

      <div th:if="${#fields.hasErrors('email')}" class="alert-error" th:errors="*{email}"></div>
      <label class="form-label">Email</label>
      <input type="text" th:field="*{email}" class="form-input" placeholder="your@email.com"/>

      <div th:if="${#fields.hasErrors('username')}" class="alert-error" th:errors="*{username}"></div>
      <label class="form-label">Username</label>
      <input type="text" th:field="*{username}" class="form-input" placeholder="Choose a username"/>

      <div th:if="${#fields.hasErrors('password')}" class="alert-error" th:errors="*{password}"></div>
      <label class="form-label">Password</label>
      <input type="password" th:field="*{password}" class="form-input" placeholder="Create a password"/>

      <button type="submit" class="btn-primary-full">Create Account</button>
    </form>

    <div class="auth-switch">
      Already have an account? <a th:href="@{/login}">Sign in</a>
    </div>

  </div>
</section>

<div th:replace="/fragments/footer :: footer"/>

</body>
</html>
