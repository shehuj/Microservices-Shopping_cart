<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity4">

<head>
  <div th:fragment="header">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mallam Shehu Suya Spot — Order Online, Pick Up Fresh</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" href="../../css/main.css"/>
  </div>
</head>

<body>
<div th:fragment="navbar">
  <nav class="qb-nav">
    <div class="container">
      <a class="qb-brand" th:href="@{/home}">🔥 <span>Mallam Shehu</span></a>

      <button class="nav-toggle" onclick="document.getElementById('nav-links').classList.toggle('open')"
              aria-label="Toggle menu">☰</button>

      <ul class="qb-links" id="nav-links">
        <li sec:authorize="isAuthenticated()">
          <a th:href="@{/shoppingCart}" class="cart-link">🧺 My Order</a>
        </li>
        <li sec:authorize="!isAuthenticated()">
          <a th:href="@{/registration}">Sign Up</a>
        </li>
        <li sec:authorize="!isAuthenticated()">
          <a th:href="@{/login}">Login</a>
        </li>
        <li sec:authorize="isAuthenticated()">
          <a th:href="@{/logout}">Sign Out</a>
        </li>
      </ul>
    </div>
  </nav>
</div>
</body>
</html>
