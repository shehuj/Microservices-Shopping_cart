<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity4">
<head></head>
<body>

<div th:fragment="products">
  <div class="menu-grid">
    <div class="food-card" th:each="product : ${products}">

      <div class="food-img">
        <span th:text="${product.name.contains('Beef') ? '🥩' :
                         product.name.contains('Chicken') ? '🍗' :
                         product.name.contains('Ram') ? '🍖' :
                         product.name.contains('Kilishi') ? '🥓' :
                         product.name.contains('Offal') ? '🍢' : '🔥'}">🔥</span>
      </div>

      <div class="food-body">
        <div class="food-name" th:text="${product.name}">Item Name</div>
        <div class="food-desc" th:text="${product.description}">Description</div>
      </div>

      <div class="food-footer">
        <span class="food-price" th:text="'₦' + ${#numbers.formatDecimal(product.price, 1, 0)}">₦0</span>

        <a th:href="@{'/shoppingCart/addProduct/{id}'(id=${product.id})}"
           sec:authorize="isAuthenticated()"
           th:if="${product.quantity} > 0">
          <button class="btn-order">+ Add</button>
        </a>
        <span class="out-of-stock" th:if="${product.quantity} == 0">Sold Out</span>
        <button class="btn-order" onclick="showSignupModal()" sec:authorize="!isAuthenticated()">Order</button>
      </div>

    </div>
  </div>
</div>

</body>
</html>
