apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-cart-deployment
  namespace: shopping-cart

spec:
  replicas: 2
  progressDeadlineSeconds: 300

  selector:
    matchLabels:
      app: shopping-cart
      tier: backend
      phase: production
      deployment: v1

  template:
    metadata:
      labels:
        app: shopping-cart
        tier: backend
        phase: production
        deployment: v1

    spec:
      automountServiceAccountToken: false

      imagePullSecrets:
        - name: dockerhub-credentials

      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: shopping-cart

          image: captcloud01/shopping-cart:__TAG__
          imagePullPolicy: Always

          ports:
            - containerPort: 8070

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 8070
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /
              port: 8070
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3

          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp

      volumes:
        - name: tmp-volume
          emptyDir: {}

---

apiVersion: v1
kind: Service

metadata:
  name: shopping-cart-svc
  namespace: shopping-cart

spec:
  type: LoadBalancer

  selector:
    app: shopping-cart
    tier: backend
    phase: production
    deployment: v1

  ports:
    - protocol: TCP
      port: 8070
      targetPort: 8070