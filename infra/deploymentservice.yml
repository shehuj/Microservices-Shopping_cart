apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-cart-deployment
  namespace: shopping-cart
spec:
  selector:
    matchLabels:
      app: shopping-cart
      tier: backend
      phase: production
      deployment: v1
  replicas: 2
  progressDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: shopping-cart
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: dockerhub-credentials
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 10000
      containers:
        - name: shopping-cart
          image: trusted-repo/shopping-cart:__TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 8070
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8070
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8070
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3

---

apiVersion: v1
kind: Service
metadata:
  name: shopping-cart-svc
  namespace: shopping-cart
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  selector:
    app: shopping-cart
  ports:
    - protocol: TCP
      port: 8070
      targetPort: 8070
  type: LoadBalancer
