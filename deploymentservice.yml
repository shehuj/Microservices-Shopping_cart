apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-cart-deployment
spec:
  selector:
    matchLabels:
      app: shopping-cart
  replicas: 2
  template:
    metadata:
      labels:
        app: shopping-cart
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: shopping-cart
          image: captcloud01/shopping-cart:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8070
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8070
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8070
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

---

apiVersion: v1
kind: Service
metadata:
  name: shopping-cart-svc
spec:
  selector:
    app: shopping-cart
  ports:
    - protocol: TCP
      port: 8070
      targetPort: 8070
  type: LoadBalancer
